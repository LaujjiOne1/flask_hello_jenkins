---
apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
spec:
  type: NodePort # Permet d'exposer l'application sur un port de ton vrai PC Windows
  selector:
    app: flask-app
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080 # <-- Tu pourras visiter ton site sur http://localhost:30080
